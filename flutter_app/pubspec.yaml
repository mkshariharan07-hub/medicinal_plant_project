name: medicinal_plant_app
description: A Flutter app for medicinal plant identification and usage prediction using ML

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  
  # Camera and Image Processing
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  image: ^4.1.3
  
  # TensorFlow Lite for ML
  tflite_flutter: ^0.10.4
  tflite_flutter_helper: ^0.3.1
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # HTTP and JSON
  http: ^1.1.0
  dio: ^5.4.0
  
  # Utilities
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Permissions
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/model/
    - assets/images/
    - assets/medicinal_plants_database.json

  fonts:
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf
